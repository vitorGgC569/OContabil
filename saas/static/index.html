<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="ContaDoc AI — Plataforma de processamento inteligente de documentos contábeis com GLiNER 2" />
  <title>ContaDoc AI — Processamento Inteligente de Documentos</title>
  <link rel="stylesheet" href="css/design-system.css" />
</head>
<body>
  <div class="app-layout">
    <!-- ─── Sidebar ─────────────────────────────────────── -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <div class="brand-icon">📄</div>
        <div class="brand-text">
          <span class="brand-name">ContaDoc AI</span>
          <span class="brand-tagline">GLiNER 2 Engine</span>
        </div>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section">
          <div class="nav-section-title">Principal</div>
          <div class="nav-item active" data-page="dashboard" tabindex="0">
            <span class="nav-icon">📊</span>
            <span class="nav-label">Dashboard</span>
          </div>
          <div class="nav-item" data-page="upload" tabindex="0">
            <span class="nav-icon">📤</span>
            <span class="nav-label">Upload</span>
            <span class="nav-badge" id="upload-badge" style="display:none">0</span>
          </div>
          <div class="nav-item" data-page="validation" tabindex="0">
            <span class="nav-icon">✅</span>
            <span class="nav-label">Validação</span>
            <span class="nav-badge" id="validation-badge">5</span>
          </div>
        </div>

        <div class="nav-section">
          <div class="nav-section-title">Gestão</div>
          <div class="nav-item" data-page="clients" tabindex="0">
            <span class="nav-icon">🏢</span>
            <span class="nav-label">Clientes</span>
          </div>
          <div class="nav-item" data-page="exports" tabindex="0">
            <span class="nav-icon">📁</span>
            <span class="nav-label">Exportações</span>
          </div>
        </div>

        <div class="nav-section">
          <div class="nav-section-title">Sistema</div>
          <div class="nav-item" data-page="settings" tabindex="0">
            <span class="nav-icon">⚙️</span>
            <span class="nav-label">Configurações</span>
          </div>
        </div>
      </nav>

      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="user-avatar">RS</div>
          <div class="user-info">
            <div class="user-name">Ricardo Silva</div>
            <div class="user-role">Administrador</div>
          </div>
        </div>
      </div>
    </aside>

    <!-- ─── Main Content ────────────────────────────────── -->
    <main class="main-content">
      <header class="content-header">
        <div class="header-left">
          <button class="btn-toggle-sidebar" id="btn-toggle-sidebar" title="Alternar menu (Ctrl+B)">☰</button>
          <div>
            <h1 class="page-title" id="page-title">Dashboard</h1>
            <p class="page-subtitle" id="page-subtitle">Visão geral do processamento</p>
          </div>
        </div>
        <div class="header-right">
          <div class="header-search">
            <span class="search-icon">🔍</span>
            <input type="text" placeholder="Buscar documentos... (Ctrl+K)" id="global-search" />
          </div>
          <button class="btn-icon" title="Notificações">
            🔔
            <span class="notification-dot"></span>
          </button>
          <button class="btn-icon" title="Ajuda">❓</button>
        </div>
      </header>

      <div class="content-body" id="content-body">
        <!-- Pages are rendered here by JS -->
      </div>
    </main>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Modal Overlay -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="modal-title"></h3>
        <button class="btn-ghost" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer" id="modal-footer"></div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/mock-data.js"></script>
  <script src="js/pages/dashboard.js"></script>
  <script src="js/pages/upload.js"></script>
  <script src="js/pages/validation.js"></script>
  <script src="js/pages/clients.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
